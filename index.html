<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f7fb; }
h2 { text-align: center; }

input { padding: 8px; margin-bottom: 10px; width: 100%; max-width: 300px; }

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  font-size: 14px;
}

th { background: #4CAF50; color: white; }
th, td { padding: 10px; text-align: left; }

tr:nth-child(even) { background: #f2f2f2; }

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-primary { background: #4CAF50; color: white; }
.btn-secondary { background: #2196F3; color: white; }

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>📋 Attendance System</h2>

<div class="card">

<input type="text" id="search" placeholder="🔍 Search student..." onkeyup="filterStudents()">

<table id="studentTable">
<thead>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Present</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="btn-primary" onclick="markAll(true)">✔ Mark All Present</button>
<button class="btn-secondary" onclick="markAll(false)">❌ Mark All Absent</button>
<button class="btn-primary" onclick="showAbsent()">Show Absent Students</button>

<h3>Absent Students:</h3>

<input type="date" id="attendanceDate">
<input type="text" id="className" placeholder="Enter Class">

<button class="btn-secondary" onclick="copyAbsent()">📋 Copy Output</button>

<pre id="absentOutput"></pre>

</div>

<script>

  { name: "Prince Kumkar", gender: "boy" },
  { name: "Prince Madan Jumare", gender: "boy" },
  { name: "Prince Nanu Verma", gender: "boy" },
  { name: "Prisha Potdar", gender: "girl" },

  { name: "Sarvagya Mishra", gender: "boy" },
  { name: "Savio Varghese", gender: "boy" },
  { name: "Shreya Jadhav", gender: "girl" },
  { name: "Shrija Yogesh Rahangdale", gender: "girl" },
  { name: "Siya Sandesh Khutale", gender: "girl" },
  { name: "Smyra Vinay Mundhe", gender: "girl" },

  { name: "Vidyesh Naresh Kotkar", gender: "boy" },
  { name: "Virat Choudhary", gender: "boy" },
  { name: "Zoya Khatoon", gender: "girl" }
];

const tableBody = document.querySelector("#studentTable tbody");

// ✅ RENDER TABLE
function renderTable(list) {
  tableBody.innerHTML = "";
  list.forEach(student => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${student.name}</td>
      <td>${student.gender}</td>
      <td><input type="checkbox"></td>
    `;
    tableBody.appendChild(row);
  });
}

// ✅ SEARCH
function filterStudents() {
  const value = document.getElementById("search").value.toLowerCase();
  const filtered = students.filter(s => s.name.toLowerCase().includes(value));
  renderTable(filtered);
}

// ✅ MARK ALL
function markAll(status) {
  document.querySelectorAll("tbody input").forEach(cb => cb.checked = status);
}

// ✅ SHOW ABSENT WITH BOYS & GIRLS
function showAbsent() {
  const rows = document.querySelectorAll("#studentTable tbody tr");

  let boys = [];
  let girls = [];

  rows.forEach(row => {
    const name = row.children[0].innerText;
    const gender = row.children[1].innerText;
    const present = row.children[2].children[0].checked;

    if (!present) {
      if (gender === "boy") boys.push(name);
      else girls.push(name);
    }
  });

  const dateInput = document.getElementById("attendanceDate").value;
  const className = document.getElementById("className").value || "Class";

  let date = "";
  if (dateInput) {
    const d = new Date(dateInput);
    date = `${d.getDate()}.${d.getMonth()+1}.${String(d.getFullYear()).slice(2)}`;
  }

  let output = `*Absent students ${date}*
${className}

👦 Boys (${boys.length})
`;
  boys.forEach(n => output += n + "\n");

  output += `
👧 Girls (${girls.length})
`;
  girls.forEach(n => output += n + "\n");

  output += `\nTotal Absent: ${boys.length + girls.length}`;

  document.getElementById("absentOutput").innerText = output;
}

// ✅ COPY
function copyAbsent() {
  const text = document.getElementById("absentOutput").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// INIT
renderTable(students);

</script>

</body>
</html>
